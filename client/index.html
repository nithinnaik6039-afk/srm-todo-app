<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Mobile viewport — prevents zoom on input focus -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / Add to Home Screen (Android) -->
    <meta name="theme-color" content="#6c63ff" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- PWA / Add to Home Screen (iOS Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SRM Todo" />

    <!-- SEO / Description -->
    <meta name="description" content="SRM Organization Todo App — Manage tasks, attendance, polls, timetable & more" />
    <meta name="application-name" content="SRM Todo" />

    <!-- Open Graph (WhatsApp/Telegram share preview) -->
    <meta property="og:title"       content="SRM Todo — Organization App" />
    <meta property="og:description" content="Track todos, attendance, IA marks, and polls for SRM Institute" />
    <meta property="og:type"        content="website" />

    <title>SRM Todo — Organization App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
